services:
  - type: web
    name: pharma-pos
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: pharma-db
          property: connectionString
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

databases:
  - name: pharma-db
    plan: starter
    databaseName: pharma
    user: pharma
